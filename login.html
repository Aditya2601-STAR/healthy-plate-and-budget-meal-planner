<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Healthy Plate & Budget Meal Planner</title>
    <meta name="description" content="Sign in or create an account for the Healthy Plate & Budget Meal Planner app." />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ===== Login Page Specific Styles ===== */

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .auth-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 6%;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 17, 32, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
        }

        .auth-header .logo {
            text-decoration: none;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auth-header .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: color 0.2s, background 0.2s;
        }

        .auth-header .back-link:hover {
            color: var(--text);
            background: var(--bg-card);
        }

        /* Main Content */
        .auth-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            position: relative;
        }

        .auth-main::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 30% 40%, rgba(34, 197, 94, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 75% 70%, rgba(245, 158, 11, 0.09) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Auth Card */
        .auth-card {
            position: relative;
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 44px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: fadeUp 0.45s ease both;
        }

        /* Tab Switcher */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 9px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 0;
            box-shadow: none;
            letter-spacing: 0;
        }

        .auth-tab.active {
            background: var(--primary);
            color: #0b1120;
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.35);
            transform: none;
        }

        .auth-tab:hover:not(.active) {
            color: var(--text);
            background: rgba(255, 255, 255, 0.07);
            transform: none;
            box-shadow: none;
        }

        /* Panel Headings */
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeUp 0.3s ease both;
        }

        .auth-greeting {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .auth-sub {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* Form Fields */
        .field-group {
            margin-bottom: 18px;
        }

        .field-group label {
            display: block;
            font-size: 0.83rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .field-group input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.97rem;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            margin-bottom: 0;
        }

        .field-group input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .field-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
        }

        /* Password wrapper */
        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 46px;
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.05rem;
            padding: 0;
            margin: 0;
            box-shadow: none;
            line-height: 1;
            transition: color 0.2s;
        }

        .toggle-pw:hover {
            color: var(--text);
            transform: translateY(-50%);
            box-shadow: none;
        }

        /* Forgot password */
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--primary);
            text-decoration: none;
            margin-top: -10px;
            margin-bottom: 22px;
            transition: opacity 0.2s;
        }

        .forgot-link:hover {
            opacity: 0.75;
        }

        /* Submit Button */
        .auth-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin-top: 8px;
        }

        /* Divider */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Social Buttons */
        .social-btns {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin: 0;
            box-shadow: none;
            letter-spacing: 0;
        }

        .social-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text);
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-1px);
            box-shadow: none;
        }

        .social-icon {
            font-size: 1.1rem;
        }

        /* Terms text */
        .terms-text {
            font-size: 0.76rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 18px;
            line-height: 1.6;
        }

        .terms-text a {
            color: var(--primary);
            text-decoration: none;
        }

        .terms-text a:hover {
            text-decoration: underline;
        }

        /* Error / Success messages */
        .auth-msg {
            display: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            margin-bottom: 18px;
        }

        .auth-msg.error {
            background: rgba(248, 113, 113, 0.12);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #f87171;
        }

        .auth-msg.success {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--primary);
        }

        /* ===== Strength Indicator ===== */
        .strength-bar {
            margin-top: 8px;
            display: flex;
            gap: 4px;
        }

        .strength-seg {
            flex: 1;
            height: 3px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.3s;
        }

        .strength-label {
            font-size: 0.74rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 500px) {
            .auth-card {
                padding: 32px 24px 28px;
            }

            .auth-greeting {
                font-size: 1.3rem;
            }

            .social-btns {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">

        <!-- Header -->
        <header class="auth-header">
            <a href="index.html" class="logo">🥗 HealthyPlate</a>
            <a href="index.html" class="back-link">← Back to App</a>
        </header>

        <!-- Main Content -->
        <main class="auth-main">
            <div class="auth-card">

                <!-- Tab Switcher -->
                <div class="auth-tabs" role="tablist">
                    <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true"
                        onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" id="tab-signup" role="tab" aria-selected="false"
                        onclick="switchTab('signup')">Create Account</button>
                </div>

                <!-- ===== LOGIN FORM ===== -->
                <div class="auth-form active" id="form-login">
                    <h1 class="auth-greeting">Welcome back 👋</h1>
                    <p class="auth-sub">Sign in to access your personalised meal plan</p>

                    <div class="auth-msg" id="login-msg"></div>

                    <div class="field-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
                    </div>

                    <div class="field-group">
                        <label for="login-password">Password</label>
                        <div class="password-wrap">
                            <input type="password" id="login-password" placeholder="••••••••"
                                autocomplete="current-password" />
                            <button class="toggle-pw" onclick="togglePassword('login-password', this)"
                                title="Show/hide password">👁</button>
                        </div>
                    </div>

                    <a href="#" class="forgot-link" onclick="showForgot(event)">Forgot password?</a>

                    <button class="auth-submit" id="login-btn" onclick="handleLogin()">Sign In →</button>

                    <div class="auth-divider">or continue with</div>

                    <div class="social-btns">
                        <button class="social-btn" onclick="handleSocial('Google')">
                            <span class="social-icon">🇬</span> Google
                        </button>
                        <button class="social-btn" onclick="handleSocial('GitHub')">
                            <span class="social-icon">🐙</span> GitHub
                        </button>
                    </div>
                </div>

                <!-- ===== SIGNUP FORM ===== -->
                <div class="auth-form" id="form-signup">
                    <h1 class="auth-greeting">Create account 🌱</h1>
                    <p class="auth-sub">Join thousands of students eating smart on a budget</p>

                    <div class="auth-msg" id="signup-msg"></div>

                    <div class="field-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" placeholder="Aditya Kumar" autocomplete="name" />
                    </div>

                    <div class="field-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
                    </div>

                    <div class="field-group">
                        <label for="signup-password">Password</label>
                        <div class="password-wrap">
                            <input type="password" id="signup-password" placeholder="Min. 8 characters"
                                autocomplete="new-password" oninput="checkStrength(this.value)" />
                            <button class="toggle-pw" onclick="togglePassword('signup-password', this)"
                                title="Show/hide password">👁</button>
                        </div>
                        <div class="strength-bar" id="strength-bar">
                            <div class="strength-seg" id="seg1"></div>
                            <div class="strength-seg" id="seg2"></div>
                            <div class="strength-seg" id="seg3"></div>
                            <div class="strength-seg" id="seg4"></div>
                        </div>
                        <div class="strength-label" id="strength-label"></div>
                    </div>

                    <div class="field-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <div class="password-wrap">
                            <input type="password" id="signup-confirm" placeholder="Repeat your password"
                                autocomplete="new-password" />
                            <button class="toggle-pw" onclick="togglePassword('signup-confirm', this)"
                                title="Show/hide password">👁</button>
                        </div>
                    </div>

                    <button class="auth-submit" id="signup-btn" onclick="handleSignup()">Create Account →</button>

                    <div class="auth-divider">or sign up with</div>

                    <div class="social-btns">
                        <button class="social-btn" onclick="handleSocial('Google')">
                            <span class="social-icon">🇬</span> Google
                        </button>
                        <button class="social-btn" onclick="handleSocial('GitHub')">
                            <span class="social-icon">🐙</span> GitHub
                        </button>
                    </div>

                    <p class="terms-text">
                        By creating an account you agree to our
                        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
                    </p>
                </div>

            </div>
        </main>
    </div>

    <script>
        // ===== Tab Switching =====
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('form-' + tab).classList.add('active');
            clearMessages();
        }

        function clearMessages() {
            document.querySelectorAll('.auth-msg').forEach(m => {
                m.style.display = 'none';
                m.textContent = '';
                m.className = 'auth-msg';
            });
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'auth-msg ' + type;
            el.style.display = 'block';
        }

        // ===== Toggle Password =====
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁';
            }
        }

        // ===== Password Strength =====
        function checkStrength(val) {
            const segs = [document.getElementById('seg1'), document.getElementById('seg2'),
            document.getElementById('seg3'), document.getElementById('seg4')];
            const label = document.getElementById('strength-label');

            segs.forEach(s => s.style.background = 'rgba(255,255,255,0.1)');

            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const colors = ['#f87171', '#fb923c', '#facc15', '#22c55e'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];

            for (let i = 0; i < score; i++) {
                segs[i].style.background = colors[score - 1];
            }
            label.textContent = val.length > 0 ? labels[score - 1] || 'Weak' : '';
            label.style.color = score > 0 ? colors[score - 1] : 'var(--text-muted)';
        }

        // ===== Login Handler =====
        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showMsg('login-msg', '⚠️ Please fill in all fields.', 'error');
                return;
            }

            if (!isValidEmail(email)) {
                showMsg('login-msg', '⚠️ Please enter a valid email address.', 'error');
                return;
            }

            // Check localStorage for stored users (demo — replace with real backend)
            const users = JSON.parse(localStorage.getItem('hp_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('hp_currentUser', JSON.stringify({ name: user.name, email: user.email }));
                showMsg('login-msg', `✅ Welcome back, ${user.name}! Redirecting...`, 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showMsg('login-msg', '❌ Incorrect email or password. Please try again.', 'error');
            }
        }

        // ===== Signup Handler =====
        function handleSignup() {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (!name || !email || !password || !confirm) {
                showMsg('signup-msg', '⚠️ Please fill in all fields.', 'error');
                return;
            }

            if (!isValidEmail(email)) {
                showMsg('signup-msg', '⚠️ Please enter a valid email address.', 'error');
                return;
            }

            if (password.length < 8) {
                showMsg('signup-msg', '⚠️ Password must be at least 8 characters.', 'error');
                return;
            }

            if (password !== confirm) {
                showMsg('signup-msg', '❌ Passwords do not match.', 'error');
                return;
            }

            // Store in localStorage (demo — replace with real backend)
            const users = JSON.parse(localStorage.getItem('hp_users') || '[]');
            if (users.find(u => u.email === email)) {
                showMsg('signup-msg', '⚠️ An account with this email already exists. Try signing in.', 'error');
                return;
            }

            users.push({ name, email, password });
            localStorage.setItem('hp_users', JSON.stringify(users));
            localStorage.setItem('hp_currentUser', JSON.stringify({ name, email }));

            showMsg('signup-msg', `🎉 Account created! Welcome, ${name}! Redirecting...`, 'success');
            setTimeout(() => window.location.href = 'index.html', 1800);
        }

        // ===== Forgot Password =====
        function showForgot(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            if (!email) {
                showMsg('login-msg', '✉️ Enter your email above to reset your password.', 'error');
                return;
            }
            showMsg('login-msg', `✅ If "${email}" exists, a reset link has been sent.`, 'success');
        }

        // ===== Social Login (demo) =====
        function handleSocial(provider) {
            alert(`${provider} sign-in is not yet connected. Please use email/password for now.`);
        }

        // ===== Helpers =====
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ===== Allow Enter key to submit =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const loginForm = document.getElementById('form-login');
                const signupForm = document.getElementById('form-signup');
                if (loginForm.classList.contains('active')) handleLogin();
                else if (signupForm.classList.contains('active')) handleSignup();
            }
        });
    </script>
</body>

</html>
